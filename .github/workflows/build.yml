name: 打包 Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖库
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl pypdf python-docx pyinstaller cryptography

    - name: 使用 PyInstaller 打包
      run: |
        pyinstaller --onefile --hidden-import cryptography --name "文件匹配工具" file_processor.py

    - name: 上传打包产物
      uses: actions/upload-artifact@v4
      with:
        name: Windows-EXE-Tool
        path: dist/文件匹配工具.exe
